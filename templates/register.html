{% extends "base.html" %}

{% block content %}

<h2>Register</h2>

<form method="POST">

<input
class="form-control mb-3"
name="name"
placeholder="Full Name"
required>

<input
class="form-control mb-3"
type="email"
name="email"
placeholder="Email"
required>

<input
class="form-control mb-3"
type="password"
name="password"
placeholder="Password"
required>

<button class="btn btn-success w-100">
Register
</button>

</form>

<a href="/login">
Already have an account?
</a>

{% endblock %}
