{% extends "base.html" %}

{% block content %}

<h2>Login</h2>

<form method="POST">

<input
class="form-control mb-3"
type="email"
name="email"
placeholder="Email"
required>

<input
class="form-control mb-3"
type="password"
name="password"
placeholder="Password"
required>

<button class="btn btn-primary w-100">
Login
</button>

</form>

<a href="/register">
Create Account
</a>

{% endblock %}
